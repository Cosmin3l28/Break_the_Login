<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>AuthX - Setare Parolă Nouă</title>
</head>
<body>
    <h2>Setează o nouă parolă</h2>
    <p>Introdu token-ul primit și noua parolă dorită.</p>
    
    <input type="text" id="token" placeholder="Token-ul de resetare" required><br><br>
    <input type="password" id="new_password" placeholder="Noua parolă" required><br><br>
    <button onclick="setNewPassword()">Salvează noua parolă</button>
    
    <p id="message" style="margin-top: 20px; font-weight: bold;"></p>

    <script>
        async function setNewPassword() {
            const token = document.getElementById('token').value;
            const new_password = document.getElementById('new_password').value;
            const messageP = document.getElementById('message');

            const response = await fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, new_password })
            });

            const data = await response.json();
            
            if (response.ok) {
                messageP.style.color = "green";
                messageP.innerHTML = `${data.message} <br><a href="/login">Loghează-te cu noua parolă</a>`;
            } else {
                messageP.style.color = "red";
                messageP.innerText = data.error || "Eroare la resetarea parolei.";
            }
        }
    </script>
</body>
</html>
