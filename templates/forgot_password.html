<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>AuthX - Forgot Password</title>
</head>
<body>
    <h2>Resetare Parolă</h2>
    <p>Introdu adresa de email pentru a primi token-ul de resetare.</p>
    
    <input type="email" id="email" placeholder="Adresa de email" required><br><br>
    <button onclick="requestReset()">Cere Resetare</button>
    
    <div id="result" style="margin-top: 20px; font-weight: bold;"></div>

    <p><a href="/login">Înapoi la Login</a></p>

    <script>
        async function requestReset() {
            const email = document.getElementById('email').value;
            const resultDiv = document.getElementById('result');

            const response = await fetch('/api/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await response.json();
            
            if (response.ok) {
                // VULNERABILITATE: Afișăm token-ul pe ecran pentru testare
                // Într-o aplicație reală, s-ar trimite doar pe email!
                resultDiv.style.color = "blue";
                resultDiv.innerHTML = `
                    Mesaj: ${data.message}<br>
                    <strong>Token-ul tău este:</strong> ${data.token}<br><br>
                    <a href="/reset-password">Mergi la pagina de setare a noii parole</a>
                `;
            } else {
                resultDiv.style.color = "red";
                resultDiv.innerText = data.error || "A apărut o eroare.";
            }
        }
    </script>
</body>
</html>
